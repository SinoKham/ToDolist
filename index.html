<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой To-Do</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <h2>SinoDo</h2>
            <nav>
                <ul>
                    <li><a href="#" class="sidebar-item" data-view="inbox">Входящие</a></li>
                    <li><a href="#" class="sidebar-item" data-view="today">Сегодня</a></li>
                    <li><a href="#" class="sidebar-item" data-view="upcoming">Предстоящие</a></li>
                    <li><a href="#" class="sidebar-item" data-view="completed">Завершенные</a></li>
                </ul>
            </nav>
            <!--Zagolovok for proektov-->
            <h3>Проекты</h3>
            <ul>
                <li class="sidebar-item" data-view="project" data-project="Работа">Работа</li>
                <li class="sidebar-item" data-view="project" data-project="Учеба">Учеба</li>
                <li class="sidebar-item" data-view="project" data-project="Дом">Дом</li>
            </ul>
            <div id="user-profile" class="user-profile">

            </div>
        </aside>
        <div class="main-area">
            <header class="topbar">
                <div class="top_search">
                    <input type="search" placeholder="Поиск задач...">
                </div>
                <div class="topbar_filters">
                    <button>Все</button>
                    <button>Активные</button>
                    <button>Завершенные</button>
                    <select>
                        <option>Все приоритеты</option>
                        <option>Низкий</option>
                        <option>Средний</option>
                        <option>Высокий</option>
                    </select>
                    <select class="sort-select">
                        <option>По дедлайну (сначала ближайшие)</option>
                        <option>По дедлайну (сначала дальние)</option>
                        <option>По приоритету (высокий → низкий)</option>
                        <option>По приоритету (низкий → высокий)</option>
                        <option>По дате добавления (новые → старые)</option>
                        <option>По дате добавления (старые → новые)</option>
                    </select>
                </div>
                <div class="topbar_actions">
                    <button>+ Новая задача</button>
                </div>
            </header>
            <main class="content">
                <!--spisok zadach-->
                
            </main>
            <div id="task-form-container" class="task-form-container" style="display: none;">
                    <form id="task-form">
                        <input type="text" name="title" placeholder="Название задачи">
                        <span class="error-message" data-error="title"></span>
                        <textarea name="description" placeholder="Описание (необязательно)"></textarea>
                        <span class="error-message" data-error="description"></span>
                        <select name="priority">
                            <option value="">Выберите приоритет</option>
                            <option>Низкий</option>
                            <option>Средний</option>
                            <option>Высокий</option>
                        </select>
                        <span class="error-message" data-error="priority"></span>
                        <input type="datetime-local" name="deadline">
                        <span class="error-message" data-error="deadline"></span>
                        <select name="category">
                            <option disabled>Выберите категорию</option>
                            <option>Работа</option>
                            <option>Учеба</option>
                            <option>Дом</option>
                        </select>
                        <span class="error-message" data-error="category"></span>
                        <button type="submit">Сохранить</button>
                        <button type="button">Отмена</button>
                    </form>
                </div>
        </div>
    </div>
    <button class="fab">+</button>
    <script src="js/taskManager.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/app.js"></script>
    <div class="overlay" id="overlay" style="display: none;"></div>
</body>
</html>
